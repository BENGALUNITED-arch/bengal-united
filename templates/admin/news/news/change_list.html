{% extends "admin/change_list.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* TRANSFORM TABLE INTO NEWS CARDS */
    table#result_list thead { display: none !important; }
    table#result_list { display: block !important; border: none !important; background: transparent !important; margin-top: 1.5rem; }
    
    table#result_list tbody {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
        gap: 1.5rem !important;
        width: 100% !important;
    }

    table#result_list tr {
        display: flex !important; flex-direction: column !important;
        background: #111827 !important; border: 1px solid #1F2937 !important;
        border-radius: 12px !important; padding: 1.5rem !important; position: relative !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4) !important;
        transition: transform 0.2s ease, border-color 0.2s ease !important;
    }
    table#result_list tr:hover { transform: translateY(-5px) !important; border-color: #3B82F6 !important; }

    table#result_list td, table#result_list th {
        display: block !important; border: none !important; padding: 0 !important; background: transparent !important; margin-bottom: 0.5rem !important;
    }

    .action-checkbox { position: absolute !important; top: 1rem !important; right: 1rem !important; z-index: 10; background: rgba(17, 24, 39, 0.8); padding: 4px; border-radius: 4px; }
    
    .field-title a { color: #F8FAFC !important; font-size: 1.25rem !important; font-weight: 800 !important; text-decoration: none !important; display: block !important; margin-bottom: 0.5rem !important; line-height: 1.2; }
    .field-title a:hover { color: #3B82F6 !important; }
    
    .field-category { color: #3B82F6 !important; font-size: 0.75rem !important; font-weight: bold !important; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem !important; }
    
    .field-publish_date { color: #9CA3AF !important; font-size: 0.875rem !important; display: flex !important; align-items: center !important; gap: 0.5rem !important; margin-top: auto !important; padding-top: 1rem !important; border-top: 1px solid #1F2937 !important;}
</style>
{% endblock %}
